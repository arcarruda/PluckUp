<!DOCTYPE html>
<html>
<head>
  <title>PluckUp — Microphone Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 40px;
      max-width: 420px;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      background: #f0f0f5;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .icon svg { color: #6e6e73; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #6e6e73; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #0066d6; }
    button:disabled { background: #ccc; cursor: default; }
    .status {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
    }
    .status.success { color: #34c759; }
    .status.error { color: #ff3b30; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#6e6e73">
        <path d="M12 1a4 4 0 0 0-4 4v7a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4zm0 18a7 7 0 0 0 7-7h-2a5 5 0 0 1-10 0H5a7 7 0 0 0 7 7zm-1 2v3h2v-3h-2z"/>
      </svg>
    </div>
    <h1>Microphone Access</h1>
    <p>PluckUp needs microphone permission for voice dictation. Click below and allow access when Chrome asks.</p>
    <button id="grant">Grant Microphone Access</button>
    <div class="status" id="status"></div>
  </div>
  <script src="microphone.js"></script>
</body>
</html>
